<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebsiteMaker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>WebsiteMaker</h1>
        <p class="subtitle">Design your website and download the code</p>
        
        <form id="designForm">
            <div class="form-group">
                <label for="siteTitle">Website Title:</label>
                <input type="text" id="siteTitle" value="My Awesome Website" required>
            </div>

            <div class="form-group">
                <label for="heading">Main Heading:</label>
                <input type="text" id="heading" value="Welcome to My Site" required>
            </div>

            <div class="form-group">
                <label for="content">Content:</label>
                <textarea id="content" rows="4" required>This is my website content. You can customize this text.</textarea>
            </div>

            <div class="form-group">
                <label for="bgColor">Background Color:</label>
                <input type="color" id="bgColor" value="#ffffff">
            </div>

            <div class="form-group">
                <label for="textColor">Text Color:</label>
                <input type="color" id="textColor" value="#333333">
            </div>

            <div class="form-group">
                <label for="accentColor">Accent Color:</label>
                <input type="color" id="accentColor" value="#007bff">
            </div>

            <div class="form-group">
                <label for="fontFamily">Font:</label>
                <select id="fontFamily">
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="'Georgia', serif">Georgia</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="'Verdana', sans-serif">Verdana</option>
                </select>
            </div>

            <div class="sections-container">
                <div class="form-group">
                    <label>Additional Sections:</label>
                    <button type="button" id="addSectionBtn" class="btn btn-add">+ Add Section</button>
                </div>
                <div id="sectionsWrapper"></div>
            </div>

            <button type="button" id="previewBtn" class="btn btn-secondary">Preview</button>
            <button type="button" id="downloadBtn" class="btn btn-primary">Download Website</button>
        </form>

        <div id="preview" class="preview-container" style="display: none;">
            <h3>Preview</h3>
            <iframe id="previewFrame"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
